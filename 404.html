<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Skyways Travel Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0d1b2a;
      color: #f9f4ec;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    .num {
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      font-weight: 700;
      color: rgba(201,168,76,0.15);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #c9a84c;
    }
    p {
      font-size: 0.95rem;
      color: rgba(249,244,236,0.6);
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      background: #c9a84c;
      color: #0d1b2a;
      padding: 12px 28px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    a:hover { background: #e8cc80; }
  </style>
</head>
<body>
  <div class="container">
    <div class="num">404</div>
    <div class="icon">✈️</div>
    <h1>This Page Got Lost in Transit</h1>
    <p>Looks like this page took a wrong turn somewhere. Don't worry — our best travel experts are on the case. Let's get you back home.</p>
    <a href="/">Back to Homepage</a>
  </div>
</body>
</html>
